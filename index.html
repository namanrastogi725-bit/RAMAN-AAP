<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#0B1120" />
<meta property="og:title" content="RAMAN — Live Stocks & Crypto Board" />
<meta property="og:description" content="Live · Trending · Search · Analyse — stocks, crypto & funds in one board." />
<meta property="og:image" content="og-thumbnail.png" />
<meta property="og:type" content="website" />
<meta name="twitter:card" content="summary_large_image" />
<meta name="twitter:title" content="RAMAN — Live Stocks & Crypto Board" />
<meta name="twitter:image" content="og-thumbnail.png" />
<title>RAMAN — Market Board</title>
<link rel="manifest" href="manifest.json" />
<link rel="icon" href="icon-192.png" />
<link rel="apple-touch-icon" href="icon-192.png" />
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap');
  :root{
    --bg:#0B1120; --surface:#121B2E; --surfaceAlt:#1A2540; --border:#243050;
    --accent:#E8B04B; --positive:#52D68A; --negative:#F2666E; --text:#EDEDE3; --muted:#8894AD;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'IBM Plex Sans',sans-serif;-webkit-tap-highlight-color:transparent;}
  #app{min-height:100vh;padding-bottom:24px;}
  .mono{font-family:'IBM Plex Mono',monospace;}
  .display{font-family:'Archivo Black',sans-serif;}
  button{font-family:inherit;cursor:pointer;}
  input,select{font-family:inherit;}
  a{color:inherit;}

  .tape-wrap{overflow:hidden;white-space:nowrap;padding:8px 0;background:#0E1526;border-top:2px dashed rgba(232,176,75,.35);border-bottom:2px dashed rgba(232,176,75,.35);}
  .tape-track{display:inline-block;animation:scroll-tape 26s linear infinite;}
  @keyframes scroll-tape{from{transform:translateX(0);}to{transform:translateX(-50%);}}
  @media (prefers-reduced-motion: reduce){.tape-track{animation:none;}}
  .tape-item{display:inline-flex;align-items:center;gap:8px;padding:0 16px;font-size:13px;}

  .header{padding:22px 20px 6px;display:flex;justify-content:space-between;align-items:flex-start;gap:12px;}
  .subtitle{font-size:11px;color:var(--muted);margin-top:4px;}
  .pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:6px 12px;font-size:11px;font-weight:600;background:var(--surfaceAlt);border:1px solid var(--border);white-space:nowrap;}
  .dot{width:6px;height:6px;border-radius:999px;display:inline-block;}

  .rowline{padding:0 20px 10px;display:flex;justify-content:space-between;align-items:center;}
  .muted{color:var(--muted);}
  .linkbtn{background:none;border:none;color:var(--muted);font-size:11px;font-weight:600;display:flex;align-items:center;gap:5px;}

  .tabs{padding:0 20px 14px;display:flex;gap:6px;overflow-x:auto;}
  .tab-btn{border-radius:10px;padding:8px 12px;font-size:13px;font-weight:500;border:1px solid var(--border);background:var(--surface);color:var(--muted);white-space:nowrap;}
  .tab-btn.active{background:var(--accent);color:#0B1120;border-color:var(--accent);}

  .content{padding:0 20px 60px;}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
  .grid2{display:grid;grid-template-columns:1fr;gap:12px;}
  @media(min-width:520px){.grid2{grid-template-columns:1fr 1fr;}}
  .grid4{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
  @media(min-width:520px){.grid4{grid-template-columns:repeat(4,1fr);}}

  .flex{display:flex;}
  .between{justify-content:space-between;}
  .center{align-items:center;}
  .gap2{gap:8px;}
  .gap1{gap:4px;}

  .badge{border-radius:6px;padding:2px 6px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;background:rgba(136,148,173,.12);color:var(--muted);}
  .trend-badge{border-radius:6px;padding:2px 6px;font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;border:1px solid;}
  .autopick-badge{border-radius:6px;padding:2px 6px;font-size:9px;font-weight:600;text-transform:uppercase;background:rgba(232,176,75,.12);color:var(--accent);}
  .change-tag{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:2px 8px;font-size:11px;font-weight:600;}

  .chip{flex-shrink:0;border-radius:999px;padding:6px 12px;font-size:12px;font-weight:600;border:1px solid var(--border);background:var(--surface);color:var(--muted);white-space:nowrap;}
  .chip.active{background:var(--accent);color:#0B1120;border-color:var(--accent);}

  .field-label{display:block;font-size:10px;text-transform:uppercase;letter-spacing:.04em;color:var(--muted);margin-bottom:4px;}
  .input{width:100%;border-radius:10px;padding:10px 12px;font-size:14px;background:var(--surfaceAlt);border:1px solid var(--border);color:var(--text);}
  .input:focus,button:focus-visible{outline:2px solid var(--accent);outline-offset:2px;}

  .btn-primary{width:100%;border-radius:10px;padding:11px;font-size:14px;font-weight:600;background:var(--accent);color:#0B1120;border:none;}
  .btn-buy{flex:1;border-radius:10px;padding:10px;font-size:14px;font-weight:600;background:var(--positive);color:#0B1120;border:none;}
  .btn-sell{flex:1;border-radius:10px;padding:10px;font-size:14px;font-weight:600;background:var(--negative);color:#0B1120;border:none;}

  .login-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
  .login-box{width:100%;max-width:380px;background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:24px;}

  .asset-card{position:relative;overflow:hidden;}
  .spark{display:block;width:100%;height:36px;}
  .toast{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);background:var(--surfaceAlt);border:1px solid var(--border);border-radius:10px;padding:10px 16px;font-size:12px;z-index:50;}
  ::-webkit-scrollbar{height:0;width:0;}
</style>
</head>
<body>
<div id="app"></div>
<script>
"use strict";

/* ===================== CONFIG / THEME ===================== */
const C = {
  positive: "#52D68A", negative: "#F2666E", accent: "#E8B04B", muted: "#8894AD", text: "#EDEDE3",

/* ===================== SEED DATA ===================== */

  { symbol:"LINK", name:"Chainlink", type:"crypto", price:15.9, volatility:0.019 },
  { symbol:"LTC", name:"Litecoin", type:"crypto", price:92.3, volatility:0.015 },
  { symbol:"TRX", name:"TRON", type:"crypto", price:0.16, volatility:0.014 },
  { symbol:"SHIB", name:"Shiba Inu", type:"crypto", price:0.0000228, volatility:0.025 },
  { symbol:"ATOM", name:"Cosmos", type:"crypto", price:7.42, volatility:0.018 },
  { symbol:"NEAR", name:"NEAR Protocol", type:"crypto", price:4.85, volatility:0.021 },
];
const HISTORY_LEN = 30;

/* ===================== HELPERS ===================== */
function randomWalk(price, vol){ const drift=(Math.random()-0.5)*2*vol; return Math.max(price*(1+drift), 0.0000001); }
function buildAsset(seed){
  const history=[]; let p=seed.price;
  for(let i=HISTORY_LEN;i>0;i--){ p=randomWalk(p, seed.volatility); history.push({t:i, price:p}); }
  history.push({t:0, price:seed.price});
  return { ...seed, open:history[0].price, volume:Math.round((seed.type==="crypto"?5e8:2e7)*(0.4+Math.random()*1.2)), history };
}
function tickAsset(a){
  const nextPrice = randomWalk(a.price, a.volatility);
  const nextHistory = [...a.history.slice(1), { t:a.history[a.history.length-1].t+1, price:nextPrice }];
  return { ...a, price:nextPrice, history:nextHistory };
}
function pctChange(a){ return ((a.price - a.open)/a.open)*100; }
function trendDirection(a){
  const h=a.history;
  const recent=h.slice(-5).reduce((s,x)=>s+x.price,0)/5;
  const priorArr=h.slice(-10,-5);
  const prior=priorArr.reduce((s,x)=>s+x.price,0)/Math.max(priorArr.length,1);
  return recent>=prior?"up":"down";
}
function fmtPrice(p){
  if(p>=1000) return p.toLocaleString(undefined,{maximumFractionDigits:0});
  if(p>=1) return p.toFixed(2);
  if(p>=0.01) return p.toFixed(4);
  return p.toFixed(8);
}
function sma(history, w){
  return history.map((pt,i)=>{
    if(i<w-1) return {...pt, sma:null};
    const slice=history.slice(i-w+1,i+1);
    return {...pt, sma: slice.reduce((s,x)=>s+x.price,0)/w};
  });
}
function esc(s){ return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }

/* ===================== STATE ===================== */
const state = {
  universe: SEED_ASSETS.map(buildAsset),
  watchlist: new Set(["AAPL","NVDA","TSLA","BTC","ETH","SOL"]),
  tab: "live",
  autoRefresh: true,
  query: "",
  typeFilter: "all",
  selectedSymbol: "AAPL",
  autoCycle: false,
  autoPick: false,
  autoAdded: new Set(),
  cash: 100000,
  holdings: {},
  orderQty: 1,
  trades: [],
  broker: { provider:"alpaca", apiKey:"", apiSecret:"", connected:false },
  auth: { stage:"phone", name:"", phone:"", otpInput:"", sentOtp:null, verified:false, error:"" },
  toast: null,
};

function findAsset(sym){ return state.universe.find(a=>a.symbol===sym) || state.universe[0]; }

function showToast(msg){
  state.toast = msg; render();
  setTimeout(()=>{ state.toast=null; render(); }, 2200);
}

/* ===================== ACTIONS ===================== */
function sendOtp(){
  const digits = state.auth.phone.replace(/\D/g,"");
  if(!state.auth.name.trim()){ state.auth.error="Please enter your name."; render(); return; }
  if(digits.length<10){ state.auth.error="Enter a valid 10-digit phone number."; render(); return; }
  const code = String(Math.floor(100000 + Math.random()*900000));
  state.auth.stage="otp"; state.auth.sentOtp=code; state.auth.otpInput=""; state.auth.error="";
  render();
}
function verifyOtp(){
  if(state.auth.otpInput === state.auth.sentOtp){ state.auth.verified=true; state.auth.error=""; }
  else { state.auth.error="Incorrect OTP, please try again."; }
  render();
}
function logout(){
  state.auth = { stage:"phone", name:"", phone:"", otpInput:"", sentOtp:null, verified:false, error:"" };
  render();
}
function toggleWatch(sym){
  state.watchlist.has(sym) ? state.watchlist.delete(sym) : state.watchlist.add(sym);
  render();
}
function logTrade(symbol, side, qty, price){
  state.trades.unshift({ id:Date.now()+Math.random(), symbol, side, qty, price, total:qty*price, time:new Date() });
  state.trades = state.trades.slice(0,50);
}
function buyAsset(){
  const a = findAsset(state.selectedSymbol); const qty = state.orderQty; const cost = a.price*qty;
  if(qty<=0 || cost>state.cash){ showToast("Not enough virtual cash."); return; }
  state.cash -= cost; state.holdings[a.symbol] = (state.holdings[a.symbol]||0)+qty;
  logTrade(a.symbol,"buy",qty,a.price); showToast(`Bought ${qty} ${a.symbol} (paper)`); render();
}
function sellAsset(){
  const a = findAsset(state.selectedSymbol); const qty = state.orderQty; const owned = state.holdings[a.symbol]||0;
  if(qty<=0 || qty>owned){ showToast("You don't own that much."); return; }
  state.cash += a.price*qty; state.holdings[a.symbol]=owned-qty;
  logTrade(a.symbol,"sell",qty,a.price); showToast(`Sold ${qty} ${a.symbol} (paper)`); render();
}
function connectBroker(){
  state.broker.connected = !!(state.broker.apiKey && state.broker.apiSecret);
  render();
}

/* ===================== TICK LOOPS ===================== */
setInterval(()=>{
  if(!state.autoRefresh) return;
  state.universe = state.universe.map(tickAsset);
  if(state.autoPick){
    const candidates = [...state.universe]
      .filter(a=>trendDirection(a)==="up" && pctChange(a)>1)
      .sort((a,b)=>pctChange(b)-pctChange(a)).slice(0,3);
    candidates.forEach(c=>{ if(!state.watchlist.has(c.symbol)){ state.watchlist.add(c.symbol); state.autoAdded.add(c.symbol); } });
  }
  render();
}, 2200);

setInterval(()=>{
  if(!state.autoCycle || state.tab!=="analyse") return;
  const idx = SEED_ASSETS.findIndex(a=>a.symbol===state.selectedSymbol);
  state.selectedSymbol = SEED_ASSETS[(idx+1)%SEED_ASSETS.length].symbol;
  render();
}, 3500);

/* ===================== RENDER PIECES ===================== */
function sparklineSVG(history, color, w=200, h=36){
  const prices = history.map(p=>p.price);
  const min = Math.min(...prices), max = Math.max(...prices);
  const range = (max-min) || 1;
  const pts = history.map((p,i)=>{
    const x = (i/(history.length-1))*w;
    const y = h - ((p.price-min)/range)*h;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  return `<svg class="spark" viewBox="0 0 ${w} ${h}" preserveAspectRatio="none"><polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2"/></svg>`;
}

function changeTag(pct){
  const up = pct>=0;
  const color = up?C.positive:C.negative;
  const bg = up?"rgba(82,214,138,.12)":"rgba(242,102,110,.12)";
  return `<span class="change-tag mono" style="color:${color};background:${bg}">${up?"▲":"▼"} ${up?"+":""}${pct.toFixed(2)}%</span>`;
}
function typeBadge(type){ return `<span class="badge mono">${type}</span>`; }
function trendBadge(a){
  const up = trendDirection(a)==="up";
  const color = up?C.positive:C.negative;
  return `<span class="trend-badge" style="color:${color};border-color:${up?'rgba(82,214,138,.4)':'rgba(242,102,110,.4)'}">${up?"Uptrend":"Downtrend"}</span>`;
}

function renderTape(){
  const list = [...state.universe, ...state.universe];
  const items = list.map(a=>{
    const pct = pctChange(a); const up = pct>=0;
    return `<span class="tape-item mono">
      <span style="color:${C.accent};font-weight:600">${a.symbol}</span>
      <span>${fmtPrice(a.price)}</span>
      <span style="color:${up?C.positive:C.negative}">${up?"▲":"▼"} ${Math.abs(pct).toFixed(2)}%</span>
    </span>`;
  }).join("");
  return `<div class="tape-wrap"><div class="tape-track">${items}</div></div>`;
}

function renderHeader(){
  return `
  <div class="header">
    <div>
      <h1 class="display" style="font-size:26px;margin:0;letter-spacing:.01em;">RAMAN</h1>
      <p class="subtitle">Stocks &amp; crypto board · simulated data</p>
    </div>
    <button class="pill" data-action="toggleAutoRefresh" style="color:${state.autoRefresh?C.positive:'var(--muted)'}">
      <span class="dot" style="background:${state.autoRefresh?C.positive:'var(--muted)'}"></span>
      ${state.autoRefresh?"Auto-refresh on":"Paused"}
    </button>
  </div>
  <div class="rowline">
    <span class="muted" style="font-size:12px;">Logged in as ${esc(state.auth.name)} · ${esc(state.auth.phone)}</span>
    <button class="linkbtn" data-action="logout">Log out</button>
  </div>`;
}

function renderTabs(){
  const tabs = [["live","Live"],["trending","Trending"],["search","Search"],["analyse","Analyse"],["api","API"]];
  return `<div class="tabs">${tabs.map(([id,label])=>
    `<button class="tab-btn ${state.tab===id?'active':''}" data-action="setTab" data-value="${id}">${label}</button>`
  ).join("")}</div>`;
}

function renderLive(){
  const topMovers = [...state.universe].sort((a,b)=>Math.abs(pctChange(b))-Math.abs(pctChange(a))).slice(0,8);
  const watchlisted = state.universe.filter(a=>state.watchlist.has(a.symbol));
  return `
  <div class="card" style="margin-bottom:16px;display:flex;justify-content:space-between;align-items:center;gap:12px;">
    <div>
      <div style="font-size:12px;font-weight:600;">Auto-add profit picks</div>
      <div class="muted" style="font-size:10px;margin-top:2px;line-height:1.4;">Auto-adds simulated uptrend assets. Demo data only — not investment advice.</div>
    </div>
    <button class="chip ${state.autoPick?'active':''}" data-action="toggleAutoPick">${state.autoPick?"On":"Off"}</button>
  </div>

  <div style="margin-bottom:16px;">
    <div class="muted" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">🔥 Now trending</div>
    <div class="flex gap2" style="overflow-x:auto;padding-bottom:4px;">
      ${topMovers.map(a=>{
        const pct=pctChange(a); const up=pct>=0;
        return `<button class="chip" data-action="openAnalyse" data-value="${a.symbol}" style="display:flex;gap:8px;">
          <span>${a.symbol}</span><span class="mono" style="color:${up?C.positive:C.negative}">${up?"▲":"▼"} ${Math.abs(pct).toFixed(1)}%</span>
        </button>`;
      }).join("")}
    </div>
  </div>

  <div class="grid2">
    ${watchlisted.length===0 ? `<p class="muted" style="font-size:13px;">Your watchlist is empty — add assets from Search.</p>` :
    watchlisted.map(a=>{
      const pct = pctChange(a);
      return `<div class="card asset-card">
        <div class="flex between center">
          <div>
            <div class="flex gap2 center">
              <span style="font-weight:600;font-size:13px;">${a.symbol}</span>
              ${typeBadge(a.type)}
              ${state.autoAdded.has(a.symbol) ? `<span class="autopick-badge">Auto-pick</span>` : ""}
            </div>
            <div class="muted" style="font-size:11px;margin-top:2px;">${esc(a.name)}</div>
          </div>
          ${changeTag(pct)}
        </div>
        <div style="margin-top:6px;">${trendBadge(a)}</div>
        <div style="margin-top:8px;">${sparklineSVG(a.history, pct>=0?C.positive:C.negative)}</div>
        <div class="mono" style="font-size:18px;font-weight:600;margin-top:4px;">$${fmtPrice(a.price)}</div>
      </div>`;
    }).join("")}
  </div>`;
}

function renderTrending(){
  const byChange = [...state.universe].sort((a,b)=>pctChange(b)-pctChange(a));
  const gainers = byChange.slice(0,5);
  const losers = [...byChange].reverse().slice(0,5);
  function col(title, list){
    return `<div>
      <div class="muted" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;margin-bottom:8px;">${title}</div>
      <div class="flex" style="flex-direction:column;gap:8px;">
        ${list.map(a=>{
          const pct=pctChange(a); const mag=Math.min(Math.abs(pct)/6,1); const up=pct>=0;
          return `<button class="card" data-action="openAnalyse" data-value="${a.symbol}" style="text-align:left;position:relative;overflow:hidden;border:1px solid var(--border);">
            <div style="position:absolute;left:0;top:0;bottom:0;width:${mag*100}%;background:${up?'rgba(82,214,138,.10)':'rgba(242,102,110,.10)'}"></div>
            <div class="flex between center" style="position:relative;">
              <div class="flex gap2 center"><span style="font-weight:600;font-size:13px;">${a.symbol}</span>${typeBadge(a.type)}</div>
              ${changeTag(pct)}
            </div>
          </button>`;
        }).join("")}
      </div>
    </div>`;
  }
  return `<div class="grid2" style="gap:20px;">${col("Top gainers", gainers)}${col("Top losers", losers)}</div>`;
}

function renderSearch(){
  const filtered = state.universe.filter(a=>
    (state.typeFilter==="all" || a.type===state.typeFilter) &&
    (a.symbol.toLowerCase().includes(state.query.toLowerCase()) || a.name.toLowerCase().includes(state.query.toLowerCase()))
  );
  const filters = [["all","All"],["stock","Stocks"],["crypto","Crypto"],["fund","Funds"]];
  return `
  <div style="position:relative;margin-bottom:12px;">
    <input class="input" style="padding-left:34px;" placeholder="Search symbol or name…" value="${esc(state.query)}" data-action="setQuery" oninput="dispatchAction(this)"/>
    <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--muted);">🔍</span>
  </div>
  <div class="flex gap1" style="margin-bottom:16px;">
    ${filters.map(([id,label])=>`<button class="chip ${state.typeFilter===id?'active':''}" data-action="setTypeFilter" data-value="${id}">${label}</button>`).join("")}
  </div>
  <div class="flex" style="flex-direction:column;gap:8px;">
    ${filtered.length===0 ? `<p class="muted" style="font-size:13px;">No assets match "${esc(state.query)}".</p>` :
    filtered.map(a=>{
      const inWatch = state.watchlist.has(a.symbol);
      return `<div class="card flex gap2 center">
        <button data-action="toggleWatch" data-value="${a.symbol}" style="background:none;border:none;font-size:16px;color:${inWatch?C.accent:'var(--muted)'};">${inWatch?"★":"☆"}</button>
        <button data-action="openAnalyse" data-value="${a.symbol}" style="flex:1;background:none;border:none;display:flex;justify-content:space-between;align-items:center;text-align:left;color:inherit;">
          <div>
            <div class="flex gap2 center"><span style="font-weight:600;font-size:13px;">${a.symbol}</span>${typeBadge(a.type)}</div>
            <div class="muted" style="font-size:11px;">${esc(a.name)}</div>
          </div>
          <div style="text-align:right;">
            <div class="mono">$${fmtPrice(a.price)}</div>
            ${changeTag(pctChange(a))}
          </div>
        </button>
      </div>`;
    }).join("")}
  </div>`;
}

function renderAnalyse(){
  const selected = findAsset(state.selectedSymbol);
  const chart = sma(selected.history, 5);
  const high = Math.max(...selected.history.map(h=>h.price));
  const low = Math.min(...selected.history.map(h=>h.price));
  const w=340,h=220,pad=8;
  const prices = chart.map(p=>p.price);
  const min = Math.min(...prices), max = Math.max(...prices), range=(max-min)||1;
  const linePts = chart.map((p,i)=>{
    const x = pad + (i/(chart.length-1))*(w-2*pad);
    const y = h-pad - ((p.price-min)/range)*(h-2*pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const smaPts = chart.filter(p=>p.sma!=null).map((p,i,arr)=>{
    const origIdx = chart.indexOf(p);
    const x = pad + (origIdx/(chart.length-1))*(w-2*pad);
    const y = h-pad - ((p.sma-min)/range)*(h-2*pad);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(" ");
  const portfolioValue = state.universe.reduce((s,a)=>s+(state.holdings[a.symbol]||0)*a.price,0);

  return `
  <div class="flex between center" style="margin-bottom:8px;">
    <div class="muted" style="font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:.04em;">All assets</div>
    <button class="chip ${state.autoCycle?'active':''}" data-action="toggleAutoCycle">${state.autoCycle?"⏸":"▶"} Auto analyse all</button>
  </div>
  <div class="flex gap2" style="overflow-x:auto;padding-bottom:12px;margin-bottom:8px;">
    ${state.universe.map(a=>`<button class="chip ${a.symbol===selected.symbol?'active':''}" data-action="selectSymbol" data-value="${a.symbol}">${a.symbol}</button>`).join("")}
  </div>

  <div class="card" style="margin-bottom:16px;">
    <div class="flex between center" style="margin-bottom:8px;">
      <div>
        <div class="flex gap2 center"><span style="font-weight:600;">${selected.symbol}</span>${typeBadge(selected.type)}</div>
        <div class="muted" style="font-size:11px;">${esc(selected.name)}</div>
      </div>
      <div style="text-align:right;">
        <div class="mono" style="font-size:20px;font-weight:600;">$${fmtPrice(selected.price)}</div>
        <div class="flex gap2 center" style="justify-content:flex-end;margin-top:2px;">${changeTag(pctChange(selected))}${trendBadge(selected)}</div>
      </div>
    </div>
    <svg viewBox="0 0 ${w} ${h}" style="width:100%;height:220px;" preserveAspectRatio="none">
      <polyline points="${linePts}" fill="none" stroke="${C.accent}" stroke-width="2"/>
      <polyline points="${smaPts}" fill="none" stroke="${C.muted}" stroke-width="1.5" stroke-dasharray="4 3"/>
    </svg>
    <div class="muted" style="font-size:10px;margin-top:4px;">— price &nbsp;&nbsp; ---- 5-period average</div>
  </div>

  <div class="grid4" style="margin-bottom:16px;">
    ${[["Open",`$${fmtPrice(selected.open)}`],["High",`$${fmtPrice(high)}`],["Low",`$${fmtPrice(low)}`],["Volume",selected.volume.toLocaleString()]]
      .map(([label,val])=>`<div class="card"><div class="muted" style="font-size:10px;text-transform:uppercase;">${label}</div><div class="mono" style="font-size:13px;font-weight:600;margin-top:2px;">${val}</div></div>`).join("")}
  </div>

  <div class="card">
    <div class="flex between center" style="margin-bottom:12px;">
      <div class="flex gap2 center"><span style="color:${C.accent};">💼</span><span class="muted" style="font-size:11px;font-weight:600;text-transform:uppercase;">${state.broker.connected?`Trade via ${state.broker.provider}`:"Paper trade (virtual money)"}</span></div>
      <span style="font-size:10px;border-radius:999px;padding:2px 8px;font-weight:600;color:${state.broker.connected?C.positive:'var(--muted)'};background:${state.broker.connected?'rgba(82,214,138,.12)':'rgba(136,148,173,.12)'}">${state.broker.connected?"Broker connected":"No broker connected"}</span>
    </div>
    <div class="flex gap2 center" style="margin-bottom:12px;">
      <input type="number" min="1" class="input mono" style="width:80px;text-align:center;" value="${state.orderQty}" data-action="setOrderQty" oninput="dispatchAction(this)"/>
      <span class="muted" style="font-size:12px;">units of ${selected.symbol}</span>
      <span class="mono muted" style="font-size:12px;margin-left:auto;">≈ $${fmtPrice(selected.price*state.orderQty)}</span>
    </div>
    <div class="flex gap2" style="margin-bottom:12px;">
      <button class="btn-buy" data-action="buy">Buy</button>
      <button class="btn-sell" data-action="sell">Sell</button>
    </div>
    <div class="flex between" style="font-size:11px;color:var(--muted);flex-wrap:wrap;gap:6px;">
      <span>Cash: <span class="mono" style="color:var(--text)">$${state.cash.toLocaleString(undefined,{maximumFractionDigits:0})}</span></span>
      <span>Holding: <span class="mono" style="color:var(--text)">${state.holdings[selected.symbol]||0} ${selected.symbol}</span></span>
      <span>Portfolio: <span class="mono" style="color:var(--text)">$${(state.cash+portfolioValue).toLocaleString(undefined,{maximumFractionDigits:0})}</span></span>
    </div>
    ${!state.broker.connected ? `<p class="muted" style="font-size:10px;margin-top:10px;line-height:1.4;">Virtual money on simulated prices only. Connect a broker in the API tab to trade for real.</p>` : ""}
  </div>

  <div class="card" style="margin-top:16px;">
    <div class="muted" style="font-size:11px;font-weight:600;text-transform:uppercase;margin-bottom:10px;">📜 Buy &amp; sell history</div>
    ${state.trades.length===0 ? `<p class="muted" style="font-size:12px;">No trades yet.</p>` :
    `<div style="max-height:280px;overflow-y:auto;display:flex;flex-direction:column;gap:8px;">
      ${state.trades.map(t=>`
        <div class="flex gap2 center" style="font-size:11px;">
          <span class="mono" style="width:40px;text-align:center;border-radius:4px;padding:2px 4px;font-weight:600;text-transform:uppercase;color:${t.side==='buy'?C.positive:C.negative};background:${t.side==='buy'?'rgba(82,214,138,.12)':'rgba(242,102,110,.12)'}">${t.side}</span>
          <span style="font-weight:600;width:60px;">${t.symbol}</span>
          <span class="muted mono">${t.qty} @ $${fmtPrice(t.price)}</span>
          <span class="mono" style="margin-left:auto;">$${t.total.toLocaleString(undefined,{maximumFractionDigits:2})}</span>
          <span class="muted" style="width:60px;text-align:right;">${new Date(t.time).toLocaleTimeString([], {hour:'2-digit',minute:'2-digit',second:'2-digit'})}</span>
        </div>`).join("")}
    </div>`}
  </div>`;
}

function renderApi(){
  const b = state.broker;
  return `
  <div class="card" style="margin-bottom:16px;">
    <div class="muted" style="font-size:11px;font-weight:600;text-transform:uppercase;margin-bottom:4px;">🔑 Broker / exchange API</div>
    <p class="muted" style="font-size:12px;margin-bottom:16px;">Enter broker/exchange credentials to move from paper trading to real orders.</p>
    <label class="field-label">Provider</label>
    <select class="input" style="margin-bottom:12px;" data-action="setProvider" onchange="dispatchAction(this)">
      ${["alpaca","ibkr","coinbase","kraken","custom"].map(p=>`<option value="${p}" ${b.provider===p?"selected":""}>${({alpaca:"Alpaca (stocks)",ibkr:"Interactive Brokers (stocks)",coinbase:"Coinbase (crypto)",kraken:"Kraken (crypto)",custom:"Custom endpoint"})[p]}</option>`).join("")}
    </select>
    <label class="field-label">API key</label>
    <input class="input" style="margin-bottom:12px;" type="password" placeholder="Paste your API key" value="${esc(b.apiKey)}" data-action="setApiKey" oninput="dispatchAction(this)"/>
    <label class="field-label">API secret</label>
    <input class="input" style="margin-bottom:16px;" type="password" placeholder="Paste your API secret" value="${esc(b.apiSecret)}" data-action="setApiSecret" oninput="dispatchAction(this)"/>
    <button class="btn-primary" data-action="connectBroker">${b.connected?"✓ Connected":"🔑 Save & connect"}</button>
  </div>
  <div class="card" style="background:rgba(242,102,110,.08);border-color:rgba(242,102,110,.3);">
    <b style="font-size:12px;">This screen stores your key only in this session's memory — it does not place real trades yet.</b>
    <p class="muted" style="font-size:11px;margin-top:8px;line-height:1.5;">Real order execution needs a secure backend: browser code can't safely hold an API secret or call most broker APIs directly (CORS + key-exposure risk). Route these credentials through your own server, then wire the Buy/Sell buttons to it.</p>
  </div>`;
}

function renderLogin(){
  const a = state.auth;
  return `<div class="login-screen">
    <div class="login-box">
      <h1 class="display" style="font-size:24px;margin:0 0 4px;">RAMAN</h1>
      <p class="muted" style="font-size:12px;margin-bottom:24px;">Log in with your phone number to continue</p>
      ${a.stage==="phone" ? `
        <label class="field-label">Name</label>
        <input class="input" style="margin-bottom:12px;" placeholder="Your name" value="${esc(a.name)}" data-action="setAuthName" oninput="dispatchAction(this)"/>
        <label class="field-label">Phone number</label>
        <input class="input" style="margin-bottom:8px;" type="tel" placeholder="+91 98765 43210" value="${esc(a.phone)}" data-action="setAuthPhone" oninput="dispatchAction(this)"/>
        ${a.error?`<p style="color:${C.negative};font-size:12px;margin-bottom:8px;">${esc(a.error)}</p>`:""}
        <button class="btn-primary" data-action="sendOtp">Send OTP</button>
      ` : `
        <p class="muted" style="font-size:12px;margin-bottom:12px;">Enter the 6-digit code for <span style="color:var(--text)">${esc(a.phone)}</span></p>
        <input class="input mono" style="margin-bottom:8px;text-align:center;letter-spacing:.3em;" maxlength="6" placeholder="000000" value="${esc(a.otpInput)}" data-action="setOtpInput" oninput="dispatchAction(this)"/>
        ${a.error?`<p style="color:${C.negative};font-size:12px;margin-bottom:8px;">${esc(a.error)}</p>`:""}
        <button class="btn-primary" data-action="verifyOtp">Verify &amp; log in</button>
        <button class="linkbtn" style="width:100%;justify-content:center;margin-top:10px;" data-action="backToPhone">← Use a different number</button>
        <div class="card" style="margin-top:16px;background:rgba(232,176,75,.08);border-color:rgba(232,176,75,.3);">
          <p style="font-size:11px;color:var(--muted);line-height:1.5;margin:0;">Demo mode: no real SMS is sent. Your code is <span class="mono" style="color:${C.accent};font-weight:600;">${a.sentOtp}</span>. Real SMS delivery needs a backend with Twilio, MSG91, or Firebase Phone Auth.</p>
        </div>
      `}
    </div>
  </div>`;
}

/* ===================== MAIN RENDER ===================== */
function render(){
  const app = document.getElementById("app");
  if(!state.auth.verified){ app.innerHTML = renderLogin(); return; }
  let body = "";
  if(state.tab==="live") body = renderLive();
  else if(state.tab==="trending") body = renderTrending();
  else if(state.tab==="search") body = renderSearch();
  else if(state.tab==="analyse") body = renderAnalyse();
  else if(state.tab==="api") body = renderApi();

  app.innerHTML = `
    ${renderTape()}
    ${renderHeader()}
    ${renderTabs()}
    <div class="content">${body}</div>
    ${state.toast ? `<div class="toast">${esc(state.toast)}</div>` : ""}
  `;
}

/* ===================== EVENT DELEGATION ===================== */
function dispatchAction(el){
  const action = el.dataset.action;
  const value = el.dataset.value;
  switch(action){
    case "setQuery": state.query = el.value; render(); focusRestore("[data-action='setQuery']", el.value.length); break;
    case "setOrderQty": state.orderQty = Math.max(1, parseInt(el.value)||1); render(); break;
    case "setProvider": state.broker.provider = el.value; state.broker.connected=false; render(); break;
    case "setApiKey": state.broker.apiKey = el.value; state.broker.connected=false; break;
    case "setApiSecret": state.broker.apiSecret = el.value; state.broker.connected=false; break;
    case "setAuthName": state.auth.name = el.value; state.auth.error=""; break;
    case "setAuthPhone": state.auth.phone = el.value; state.auth.error=""; break;
    case "setOtpInput": state.auth.otpInput = el.value.replace(/\D/g,""); state.auth.error=""; break;
  }
}
function focusRestore(sel, pos){
  requestAnimationFrame(()=>{ const el=document.querySelector(sel); if(el){ el.focus(); try{el.setSelectionRange(pos,pos);}catch(e){} } });
}

document.addEventListener("click", (e)=>{
  const el = e.target.closest("[data-action]");
  if(!el) return;
  const action = el.dataset.action, value = el.dataset.value;
  switch(action){
    case "toggleAutoRefresh": state.autoRefresh = !state.autoRefresh; render(); break;
    case "logout": logout(); break;
    case "setTab": state.tab = value; render(); break;
    case "toggleAutoPick": state.autoPick = !state.autoPick; render(); break;
    case "openAnalyse": state.selectedSymbol = value; state.tab="analyse"; render(); break;
    case "toggleWatch": toggleWatch(value); break;
    case "setTypeFilter": state.typeFilter = value; render(); break;
    case "selectSymbol": state.selectedSymbol = value; render(); break;
    case "toggleAutoCycle": state.autoCycle = !state.autoCycle; render(); break;
    case "buy": buyAsset(); break;
    case "sell": sellAsset(); break;
    case "connectBroker": connectBroker(); break;
    case "sendOtp": sendOtp(); break;
    case "verifyOtp": verifyOtp(); break;
    case "backToPhone": state.auth.stage="phone"; state.auth.otpInput=""; state.auth.error=""; render(); break;
  }
});

/* ===================== PWA / SERVICE WORKER ===================== */
if("serviceWorker" in navigator){
  window.addEventListener("load", ()=>{
    navigator.serviceWorker.register("service-worker.js").catch(()=>{});
  });
}

/* ===================== INIT ===================== */
render();
</script>
</body>
</html>
